<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>don't make auntie angry </title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    min-height:100vh;
    background:#ffffff;
    overflow-x:hidden;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:12px;
    font-family:Arial,sans-serif;
}

.video-link{
    width:100%;
    max-width:520px;
    display:block;
    text-decoration:none;
}

.video-frame{
    position:relative;
    width:100%;
    aspect-ratio:9/16;
    overflow:hidden;
    background:#000;
    cursor:pointer;
}

/* Thumbnail */

.video-frame img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* Gradient bawah */

.video-frame::after{
    content:"";
    position:absolute;
    left:0;
    bottom:0;
    width:100%;
    height:30%;
    background:linear-gradient(
        to top,
        rgba(0,0,0,.75),
        transparent
    );
    pointer-events:none;
}

/* Play Button */

.play-button{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:88px;
    height:88px;
    border-radius:50%;
    background:rgba(0,0,0,.45);
    border:2px solid rgba(255,255,255,.95);
    display:flex;
    justify-content:center;
    align-items:center;
    backdrop-filter:blur(4px);
    z-index:2;
}

.play-button::before{
    content:"▶";
    color:#fff;
    font-size:34px;
    margin-left:6px;
}

/* Progress Bar */

.controls{
    position:absolute;
    left:50%;
    bottom:18px;
    transform:translateX(-50%);
    width:90%;
    z-index:2;
}

.progress{
    width:100%;
    height:4px;
    background:rgba(255,255,255,.3);
    border-radius:999px;
    overflow:hidden;
}

.progress::after{
    content:"";
    display:block;
    width:30%;
    height:100%;
    background:#ffffff;
}

/* Tablet */

@media (max-width:768px){

    .video-link{
        max-width:460px;
    }

    .play-button{
        width:76px;
        height:76px;
    }

    .play-button::before{
        font-size:30px;
    }

}

/* HP Kecil */

@media (max-width:480px){

    body{
        padding:0;
    }

    .video-link{
        max-width:100%;
    }

    .play-button{
        width:68px;
        height:68px;
    }

    .play-button::before{
        font-size:26px;
    }

    .controls{
        bottom:14px;
    }

}

</style>
</head>
<body>

<a class="video-link"
   href="https://sweetcakes69.blogspot.com/2026/07/don-t-make-auntie-angry.html"
   target="_blank"
   rel="noopener noreferrer">

    <div class="video-frame">

        <img
            src="https://i.imgur.com/5ClX1N8.jpeg"
            alt="Video Thumbnail">

        <div class="play-button"></div>

        <div class="controls">
            <div class="progress"></div>
        </div>

    </div>

</a>

</body>
</html>
